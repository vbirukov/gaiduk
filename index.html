<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="theme-color"
      content="#171614"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#f7f6f2"
      media="(prefers-color-scheme: light)"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Haiduk" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="icon" href="./icons/icon-192.webp" type="image/webp" />
    <link rel="apple-touch-icon" href="./icons/icon-192.webp" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Haiduk Audiotales Player</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=boska@400,500,700&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var skin = localStorage.getItem("gayduk-skin-v1");
        var appearance = localStorage.getItem("gayduk-appearance-v1");
        if (skin === "jaipur") {
          document.documentElement.setAttribute("data-skin", "jaipur");
          document.documentElement.setAttribute("data-theme", "jaipur");
        } else if (skin === "rastaman-light" || appearance === "light") {
          document.documentElement.setAttribute("data-skin", "rastaman-light");
          document.documentElement.setAttribute("data-theme", "rastaman-light");
        } else {
          document.documentElement.setAttribute("data-skin", "rastaman");
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {}
    </script>
    <script type="module" src="/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <noscript
      ><div>
        <img
          src="https://mc.yandex.ru/watch/109337902"
          style="position: absolute; left: -9999px"
          alt=""
        /></div
    ></noscript>
  </body>
</html>
