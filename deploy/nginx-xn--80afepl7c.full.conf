# Пример цельного vhost под аудио-прокси.
# 1) Проверь пути сертификата: ls /etc/letsencrypt/live/
# 2) Скопируй на сервер, подправь ssl_certificate* при другом имени каталога.
# 3) sudo cp ... /etc/nginx/sites-available/gayduk-audio
# 4) sudo ln -sf /etc/nginx/sites-available/gayduk-audio /etc/nginx/sites-enabled/gayduk-audio
# 5) Отключи дубли: убери/переименуй другой site с тем же server_name (sites-enabled).
# 6) sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name xn--80afepl7c.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xn--80afepl7c.xn--p1ai;

    ssl_certificate     /etc/letsencrypt/live/xn--80afepl7c.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80afepl7c.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Cross-Origin-Resource-Policy;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers
            "Range, Content-Type, Accept, If-Range, If-Match, If-None-Match" always;
        add_header Access-Control-Expose-Headers
            "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
