# Статика плеера (Vite dist → DEPLOY_WEB_ROOT, обычно /var/www/gayduk).
# Замени server_name на домен, с которого открывают приложение (вместо бакета YC).
#
# sudo cp deploy/nginx-gayduk-app.full.conf /etc/nginx/sites-available/gayduk-app
# sudo ln -sf /etc/nginx/sites-available/gayduk-app /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name your-app.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-app.example.com;

    root /var/www/gayduk;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/your-app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-app.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|webp|svg|woff2?|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
