# Вставь содержимое в server { ... } для HTTPS на xn--80afepl7c.xn--p1ai
# (или include из sites-available). Замени upstream при другом порту.

location / {
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Expose-Headers;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Cross-Origin-Resource-Policy;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers
        "Range, Content-Type, Accept, If-Range, If-Match, If-None-Match" always;
    add_header Access-Control-Expose-Headers
        "Content-Length, Content-Range, Accept-Ranges" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;

    proxy_pass http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Range $http_range;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
