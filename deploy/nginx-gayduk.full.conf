# Единый vhost: фронт (/) + аудио-прокси (/audio/).
# Домен: xn--80afepl7c.xn--p1ai (гайдук.рф)
#
# sudo cp deploy/nginx-gayduk.full.conf /etc/nginx/sites-available/gayduk
# sudo rm -f /etc/nginx/sites-enabled/gayduk-audio gayduk-app  # старые дубли
# sudo ln -sf /etc/nginx/sites-available/gayduk /etc/nginx/sites-enabled/gayduk
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name xn--80afepl7c.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name xn--80afepl7c.xn--p1ai;

    root /var/www/gayduk;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/xn--80afepl7c.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80afepl7c.xn--p1ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Локальные mp3 + catalog.json (после scripts/sync-disk-media.mjs → /var/media)
    # ^~ — не отдавать SPA fallback (index.html) на /media/*.mp3
    location ^~ /media/ {
        alias /var/media/;
        default_type application/octet-stream;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        types {
            application/json json;
            audio/mpeg mp3;
            audio/mp4 m4a;
            audio/ogg ogg;
            audio/wav wav;
        }
    }

    # Аудио-прокси (пока не всё скачано с Диска). /audio/?url=https://downloader.disk.yandex.ru/...
    location /audio/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Cross-Origin-Resource-Policy;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers
            "Range, Content-Type, Accept, If-Range, If-Match, If-None-Match" always;
        add_header Access-Control-Expose-Headers
            "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;

        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|webp|svg|woff2?|webmanifest|jpg|jpeg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
